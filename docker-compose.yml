services:
  train:
    build:
      context: .
      dockerfile: Dockerfile.train
    volumes:
      - ./:/workspace/project
      - ./checkpoints:/workspace/checkpoints
    working_dir: /workspace/project
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ["1"]
              capabilities: [gpu]
    env_file: .env
    shm_size: ${SHM_SIZE}
    command: python scripts/train.py

  train-classifier:
    build:
      context: .
      dockerfile: Dockerfile.train
    volumes:
      - ./:/workspace/project
      - ./checkpoints:/workspace/checkpoints
    working_dir: /workspace/project
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ["0"]
              capabilities: [gpu]
    env_file: .env
    command: python scripts/train_classifier.py --device 0

  evaluate:
    build:
      context: .
      dockerfile: Dockerfile.train
    volumes:
      - ./:/workspace/project
      - ./checkpoints:/workspace/checkpoints
    working_dir: /workspace/project
    command: python scripts/evaluate.py --watch --interval 120
    depends_on:
      - train

  prepare-data:
    build:
      context: .
      dockerfile: Dockerfile.train
    volumes:
      - ./:/workspace/project
    working_dir: /workspace/project
    command: python scripts/prepare_data.py

  hard-mining:
    build:
      context: .
      dockerfile: Dockerfile.train
    volumes:
      - ./:/workspace/project
      - ./checkpoints:/workspace/checkpoints
    working_dir: /workspace/project
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    env_file: .env
    environment:
      - CUDA_VISIBLE_DEVICES=0
    command: python scripts/hard_mining.py

  augment:
    build:
      context: .
      dockerfile: Dockerfile.train
    volumes:
      - ./:/workspace/project
    working_dir: /workspace/project
    command: ["sh", "-c", "python scripts/augment_data.py && python scripts/augment_cropmix.py"]

  clean-data:
    build:
      context: .
      dockerfile: Dockerfile.train
    volumes:
      - ./:/workspace/project
    working_dir: /workspace/project
    command: ["sh", "-c", "rm -rf /workspace/project/data/yolo /workspace/project/data/dataset.yaml /workspace/project/data/_yolo_labels_staging && echo 'Cleaned data directories'"]

  clean-checkpoints:
    build:
      context: .
      dockerfile: Dockerfile.train
    volumes:
      - ./:/workspace/project
      - ./checkpoints:/workspace/checkpoints
    working_dir: /workspace/project
    command: ["sh", "-c", "rm -rf /workspace/checkpoints/* && echo 'Cleaned checkpoints'"]

  test:
    build:
      context: .
      dockerfile: Dockerfile.train
    volumes:
      - ./:/workspace/project
    working_dir: /workspace/project
    command: python -m pytest tests/ -v --tb=short

  mock-endpoint:
    build:
      context: .
      dockerfile: Dockerfile.test
    ports:
      - "8080:8080"
    volumes:
      - ./:/workspace/project
    working_dir: /workspace/project
    environment:
      - DATA_DIR=/workspace/project/data

  export:
    build:
      context: .
      dockerfile: Dockerfile.train
    volumes:
      - ./:/workspace/project
      - ./checkpoints:/workspace/checkpoints
    working_dir: /workspace/project
    command: python scripts/export_model.py

  package:
    build:
      context: .
      dockerfile: Dockerfile.train
    volumes:
      - ./:/workspace/project
    working_dir: /workspace/project
    command: python scripts/package_submission.py

  sandbox:
    build:
      context: .
      dockerfile: Dockerfile.sandbox
    volumes:
      - ./submission:/submission:ro
      - ./submission:/workspace/submission:ro
      - ./data:/data:ro
      - ./scripts/sandbox_run.py:/workspace/sandbox_run.py:ro
      - ./config.py:/workspace/config.py:ro
    working_dir: /workspace
    tmpfs:
      - /tmp:size=2G
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ["0"]
              capabilities: [gpu]
        limits:
          cpus: "4"
          memory: 16G
    network_mode: none
    environment:
      - SANDBOX_ENV=1
      - HOME=/tmp
    entrypoint: ["python"]
    command: ["/workspace/sandbox_run.py", "--dir", "/submission", "--annotations", "/data/coco_dataset/train/annotations.json", "--images", "/data/coco_dataset/train/images", "--data-images-dir", "/tmp/images", "--output-dir", "/tmp/output"]
